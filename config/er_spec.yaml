api_version: kanoniv/v1
# semantic version of the spec -> worth tracking alongside package version
identity_version: "1.0.0"

entity:
  name: business

sources:
  business_entity_registry:
    adapter: arrow
    location: silver/business_entity_registry/business_entity_registry.delta
    primary_key: entity_id
    schema:
      entity_id: { type: string }
      company_name: { type: string }
      company_name_normalized: { type: string, nullable: true }
      address_1: { type: string, nullable: true }
      postal_code: { type: string, nullable: true }
      city: { type: string, nullable: true }
      is_active: { type: boolean }

  licenses_registry:
    adapter: arrow
    location: silver/licenses_registry/licenses_registry.delta
    primary_key: license_id
    schema:
      license_id: { type: string }
      company_name: { type: string }
      company_name_normalized: { type: string, nullable: true }
      address_1: { type: string, nullable: true }
      postal_code: { type: string, nullable: true }
      city: { type: string, nullable: true }
      naics_code: { type: string, nullable: true }
      naics_code_label: { type: string, nullable: true }
      expiration_date: { type: dict, nullable: true }

  sub_contractors_registry:
    adapter: arrow
    location: silver/sub_contractors_registry/sub_contractors_registry.delta
    primary_key: vendor_id
    schema:
      vendor_id: { type: string }
      entity_id: { type: string, nullable: true }
      company_name: { type: string }
      company_name_normalized: { type: string, nullable: true }
      certification_type: { type: string, nullable: true }
      trade_specialty: { type: string, nullable: true }


rules:
  - name: entity_id_exact
    type: exact
    field: entity_id
    weight: 1.0
  - name: name_fuzzy
    type: similarity
    field: company_name
    algorithm: jaro_winkler
    threshold: 0.9
    weight: 0.6
  - name: city_and_name
    type: composite
    operator: and
    children:
      - name: company_name_normalized_fuzzy
        type: similarity
        field: company_name_normalized
        algorithm: jaro_winkler
        threshold: 0.8
        weight: 0.6
      - name: city_fuzzy
        type: levenshtein
        field: city
        threshold: 0.9
        weight: 0.2




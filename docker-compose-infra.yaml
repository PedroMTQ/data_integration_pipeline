# pipeline: request_handler->html_fetcher->common_extractor->noise_detection->text_cleaner->page_predictor->summarizer->response_handler->
x-common-infra: &common-infra
  networks:
    - data-integration-network

x-common-minio: &common-minio
  image: quay.io/minio/minio:RELEASE.2025-01-20T14-49-07Z

services:
  postgres:
    <<: *common-infra
    container_name: data-integration-postgres
    image: postgres:16.4-bullseye
    shm_size: 1g
    ports:
      - ${POSTGRES_HOST}:${POSTGRES_PORT}:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - ./data/postgres/data/:/var/lib/postgresql/data
    # healthcheck:
    #   test: ["CMD-SHELL", "pg_isready", "-d", "data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    <<: [*common-infra, *common-minio]
    container_name: data-integration-minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${S3_PORT}:9000" # S3 API
      - "9001:9001" # Web UI
    volumes:
      - ./data/minio/data/:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    <<: [*common-infra, *common-minio]
    container_name: data-integration-minio-init
    environment:
      S3_BUCKETS: ${S3_BUCKETS}
      S3_ALIAS: "data-integration-minio"
      S3_URL: "http://minio:9000"
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts/create-buckets.sh:/minio_init/create-buckets.sh
      - ./data/minio/data/:/data
    entrypoint: ["/bin/sh", "/minio_init/create-buckets.sh"]

networks:
  data-integration-network:
    name: data-integration-network
    driver: bridge
